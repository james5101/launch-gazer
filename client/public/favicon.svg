<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background with rounded corners -->
  <rect width="100" height="100" rx="22" fill="#000000"/>

  <!-- Outer bearing ring — cyan -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="rgba(0,229,255,0.65)" stroke-width="2"/>

  <!-- Cardinal ticks (N/E/S/W) -->
  <line x1="50" y1="7"  x2="50" y2="17" stroke="rgba(0,229,255,0.9)"   stroke-width="2.5"/>
  <line x1="93" y1="50" x2="83" y2="50" stroke="rgba(0,229,255,0.9)"   stroke-width="2.5"/>
  <line x1="50" y1="93" x2="50" y2="83" stroke="rgba(0,229,255,0.9)"   stroke-width="2.5"/>
  <line x1="7"  y1="50" x2="17" y2="50" stroke="rgba(0,229,255,0.9)"   stroke-width="2.5"/>

  <!-- Intercardinal ticks (NE/SE/SW/NW) -->
  <line x1="80" y1="20" x2="74" y2="26" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <line x1="80" y1="80" x2="74" y2="74" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <line x1="20" y1="80" x2="26" y2="74" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <line x1="20" y1="20" x2="26" y2="26" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- Crosshairs -->
  <line x1="7"  y1="50" x2="43" y2="50" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <line x1="57" y1="50" x2="93" y2="50" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <line x1="50" y1="7"  x2="50" y2="43" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <line x1="50" y1="57" x2="50" y2="93" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>

  <!-- Centre pip -->
  <circle cx="50" cy="50" r="2.8" fill="rgba(255,255,255,0.75)"/>

  <!-- Trajectory arc (dashed) -->
  <path d="M 42,72 C 36,55 52,32 68,20" fill="none"
        stroke="rgba(0,229,255,0.6)" stroke-width="2.2"
        stroke-dasharray="4 3" stroke-linecap="round"/>

  <!-- Solid arc near rocket -->
  <path d="M 60,30 C 63,26 66,23 68,20" fill="none"
        stroke="#00E5FF" stroke-width="3" stroke-linecap="round"/>

  <!-- Rocket glow -->
  <circle cx="68" cy="20" r="9"  fill="rgba(0,229,255,0.2)"/>
  <circle cx="68" cy="20" r="5"  fill="rgba(0,229,255,0.3)"/>

  <!-- Rocket (rotated 34° to match trajectory tangent) -->
  <g transform="translate(68,20) rotate(34)">
    <polygon points="0,-10 -4.5,0 4.5,0"        fill="#00E5FF"/>
    <rect x="-3.2" y="0" width="6.4" height="8" fill="#00E5FF" opacity="0.9"/>
    <polygon points="-3.2,5 -8,11 -3.2,8"       fill="#00E5FF" opacity="0.75"/>
    <polygon points="3.2,5 8,11 3.2,8"          fill="#00E5FF" opacity="0.75"/>
    <ellipse cx="0" cy="12" rx="2.8" ry="4.5"   fill="rgba(0,229,255,0.45)"/>
  </g>
</svg>
